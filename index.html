<!DOCTYPE html>
<html lang="ko">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Milan Como South Tyrol Dolomites Route Map</title>
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
 <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
 <style>
  html, body, #map { height: 100%; margin: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }

  .major-label {
   background: rgba(255,255,255,0.94);
   border: 1px solid rgba(18,59,99,0.10);
   border-radius: 999px;
   padding: 4px 10px;
   color: #123b63;
   font-weight: 700;
   font-size: 12px;
   box-shadow: 0 2px 8px rgba(0,0,0,0.08);
   white-space: nowrap;
  }

  .minor-label {
   background: rgba(255,255,255,0.92);
   border: 1px solid rgba(198,165,69,0.25);
   border-radius: 999px;
   padding: 3px 9px;
   color: #7a6220;
   font-weight: 700;
   font-size: 11.5px;
   box-shadow: 0 2px 8px rgba(0,0,0,0.06);
   white-space: nowrap;
  }

  .leaflet-popup-content {
   font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
   line-height: 1.45;
   color: #243b53;
  }
 </style>
</head>
<body>
 <div id="map"></div>

 <script>
  const map = L.map('map', {
   zoomControl: true,
   scrollWheelZoom: true
  });

  L.tileLayer(
   'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
   {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 20
   }
  ).addTo(map);

  const majorStyle = {
   radius: 10,
   color: '#ffffff',
   weight: 3,
   fillColor: '#123b63',
   fillOpacity: 1
  };

  const minorStyle = {
   radius: 6,
   color: '#c6a545',
   weight: 3,
   fillColor: '#ffffff',
   fillOpacity: 1
  };

  const majorStops = [
   {
    name: 'Milan MXP',
    lat: 45.6306, lng: 8.7281,
    day: 'Day 1',
    note: '9/19 · 밀라노 도착'
   },
   {
    name: 'Como',
    lat: 45.8081, lng: 9.0852,
    day: 'Day 2–3',
    note: '9/20–9/21 · 코모 2박'
   },
   {
    name: 'South Tyrol',
    lat: 46.4983, lng: 11.3548,
    day: 'Day 4',
    note: '9/22 · 남티롤 1박'
   },
   {
    name: 'Dolomites',
    lat: 46.4102, lng: 11.8440,
    day: 'Day 5–6',
    note: '9/23–9/24 · 돌로미티 2박'
   },
   {
    name: 'Val Gardena',
    lat: 46.5667, lng: 11.6667,
    day: 'Day 7',
    note: '9/25 · Val Gardena 1박'
   },
   {
    name: 'Milan',
    lat: 45.4642, lng: 9.1900,
    day: 'Day 8',
    note: '9/26 · 밀라노 관광 후 공항 이동'
   }
  ];

  const minorStops = [
   {
    name: 'South Tyrol Wine Road',
    lat: 46.4087, lng: 11.2540,
    day: 'Day 4',
    note: '남티롤 핵심 경유'
   },
   {
    name: 'Milan MXP',
    lat: 45.6306, lng: 8.7281,
    day: 'Day 8',
    note: '9/26 · 밀라노 출발'
   }
  ];

  const carRoute = [
   [45.6306, 8.7281],   // Milan MXP
   [45.8081, 9.0852],   // Como
   [46.4087, 11.2540],  // South Tyrol Wine Road
   [46.4983, 11.3548],  // South Tyrol
   [46.4102, 11.8440],  // Dolomites
   [46.5667, 11.6667],  // Val Gardena
   [45.4642, 9.1900],   // Milan
   [45.6306, 8.7281]    // Milan MXP
  ];

  const carOptions = {
   color: '#c6a545',
   weight: 5,
   opacity: 0.95,
   lineCap: 'round',
   lineJoin: 'round'
  };

  L.polyline(carRoute, carOptions)
   .bindTooltip('Milan MXP → Como → South Tyrol → Dolomites → Val Gardena → Milan → Milan MXP')
   .addTo(map);

  majorStops.forEach(stop => {
   L.circleMarker([stop.lat, stop.lng], majorStyle)
    .addTo(map)
    .bindPopup(`<b>${stop.day}</b><br>${stop.name}<br><span style="font-size:12px;color:#666;">${stop.note}</span>`)
    .bindTooltip(`${stop.day} · ${stop.name}`, {
     permanent: true,
     direction: 'top',
     offset: [0, -12],
     className: 'major-label'
    });
  });

  minorStops.forEach(stop => {
   const duplicateMxp = stop.name === 'Milan MXP';
   if (!duplicateMxp) {
    L.circleMarker([stop.lat, stop.lng], minorStyle)
     .addTo(map)
     .bindPopup(`<b>${stop.day}</b><br>${stop.name}<br><span style="font-size:12px;color:#666;">${stop.note}</span>`)
     .bindTooltip(stop.name, {
      permanent: true,
      direction: 'right',
      offset: [10, 0],
      className: 'minor-label'
     });
   }
  });

  const bounds = L.latLngBounds([
   ...majorStops.map(s => [s.lat, s.lng]),
   ...minorStops.filter(s => s.name !== 'Milan MXP').map(s => [s.lat, s.lng])
  ]);
  map.fitBounds(bounds.pad(0.18));
 </script>
</body>
</html>
